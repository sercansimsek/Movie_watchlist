<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Movie Watchlist</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="header-title">Find your film</h1>
      <a href="watchlist.html" class="header-link">My Watchlist</a>
    </header>

    <form class="form flexCenter">
      <label for="search" class="flexCenter"
        ><img src="/images/Search.svg" alt="search icon" class="search-icon"
      /></label>
      <input
        type="text"
        name="search"
        id="search"
        class="search-input"
        placeholder="Search for a movie"
      />
      <button type="submit" class="submit-btn">Search</button>
    </form>

    <main class="main flexCenter">
      <img
        src="/images/no-data-initial.svg"
        alt="Empty photo roll image with the text 'start exploring' beneath"
        class="start-exploring"
      />
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
